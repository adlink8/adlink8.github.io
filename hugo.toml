baseURL = 'https://adlink8.github.io/'
languageCode = 'en-us'
title = 'ShuoYan | Engineering Portfolio'
theme = 'PaperMod'

[taxonomies]
    category = "categories"
    tag = "tags"

[pagination]
    pageSize = 10

# Output formats required for search functionality
[outputs]
    home = ["HTML", "RSS", "JSON"]
    section = ["HTML"]
    taxonomy = ["HTML"]
    term = ["HTML"]

# =======================================================
# NAVIGATION MENU: Complete DevOps Cycle
# =======================================================

# 1. Timeline: Daily progress (Input)
[[menu.main]]
    identifier = "daily"
    name = "Timeline"
    pre = "📅 "
    url = "/daily/"
    weight = 10

# 2. Lab Notes: Troubleshooting & Fixes (Practice)
[[menu.main]]
    identifier = "pitfalls"
    name = "Lab Notes"
    pre = "🛠️ "
    url = "/pitfalls/"
    weight = 20

# 3. Insights: Architecture & Deep Dives (Depth)
[[menu.main]]
    identifier = "insights"
    name = "Insights"
    pre = "💡 "
    url = "/insights/"
    weight = 30

# 4. Reflection: Retrospectives (Review)
[[menu.main]]
    identifier = "reflections"
    name = "Reflection"
    pre = "🔄 "
    url = "/reflections/"
    weight = 35

# 5. Project Logs: Build logs & progress
[[menu.main]]
    identifier = "project-logs"
    name = "Project Logs"
    pre = "📁 "
    url = "/project-logs/"
    weight = 36

# 6. Tech Stack: Tags Filter (Index)
[[menu.main]]
    identifier = "tags"
    name = "Tech Stack"
    pre = "🏷️ "
    url = "/tags/"
    weight = 40

# 7. Search
[[menu.main]]
    identifier = "search"
    name = "Search"
    pre = "🔍 "
    url = "/search/"
    weight = 50

[params]
    env = "production"
    author = "Li Shuo Yan"
    ShowCodeCopyButtons = true
    ShowReadingTime = true
    # Ensures only posts appear in the main content area
    mainSections = ["daily", "pitfalls", "reflections", "insights", "project-logs"]

    # Left Sidebar Profile Configuration
 [params.homeInfoParams]
    Title = ""
    Content = """
![Avatar](/image/tx.jpg)

# Hi, I'm Li Shuo Yan

**DevOps Aspirant | Cloud Native & CI/CD Learner**

---

### Learning Tracks
- 📅 Timeline: **[Daily Progress](/daily/)**
- 🛠️ Lab Notes: **[Troubleshooting](/pitfalls/)**
- 💡 Insights: **[Architecture](/insights/)**
- 🔄 Reflection: **[Retrospectives](/reflections/)**
- 📁 Project Logs: **[Build Progress](/project-logs/)**

---
[Personal Website Link]
"""
    # Social Media Links
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/adlink8"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/feed/"

# Syntax Highlighting Settings
[markup.highlight]
    style = "dracula"
    lineNos = true

# Allow HTML rendering for images and custom components
[markup.goldmark.renderer]
    unsafe = true
